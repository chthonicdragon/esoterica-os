<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gateway Ping</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; background: #0b0f1e; color: #d1d5db; padding: 24px; }
    .card { max-width: 820px; margin: 0 auto; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
    h1 { font-size: 18px; margin: 0 0 12px; color: #e5e7eb; }
    button { background: #22c55e; color: #0b0f1e; border: 0; border-radius: 8px; padding: 10px 14px; margin-top: 12px; cursor: pointer; font-weight: 600; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    pre { background: #0f172a; color: #93c5fd; padding: 10px; border-radius: 8px; overflow: auto; font-size: 12px; }
    .small { font-size: 12px; opacity: 0.8; }
    .ok { color: #34d399; }
    .fail { color: #f87171; }
    .warn { color: #f59e0b; }
    input[type="text"] { width: 100%; background: #0f172a; color: #e5e7eb; border: 1px solid #334155; border-radius: 8px; padding: 8px; }
    label { display: block; margin-top: 8px; }
  </style>
  <script>
    const defaults = {
      model: 'meta-llama/llama-3.1-8b-instruct:free',
      prompt: 'Say hello in one short sentence.'
    }
  </script>
  <script type="module">
    const $ = (id) => document.getElementById(id)
    const enc = (v) => JSON.stringify(v, null, 2)

    async function ping(url, body) {
      const t0 = performance.now()
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      })
      const t1 = performance.now()
      const text = await res.text()
      return { ok: res.ok, status: res.status, ms: (t1 - t0).toFixed(1), body: text }
    }

    async function run() {
      $('out-or').textContent = '…'
      $('out-groq').textContent = '…'
      const model = $('model').value || defaults.model
      const prompt = $('prompt').value || defaults.prompt
      const payload = { model, messages: [{ role: 'user', content: prompt }], max_tokens: 32, temperature: 0 }
      try {
        const orRes = await ping('/api/openrouter', payload)
        $('out-or').textContent = enc(orRes)
      } catch (e) {
        $('out-or').textContent = 'Request failed: ' + (e?.message || 'unknown')
      }
      try {
        const gRes = await ping('/api/groq', payload)
        $('out-groq').textContent = enc(gRes)
      } catch (e) {
        $('out-groq').textContent = 'Request failed: ' + (e?.message || 'unknown')
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      $('model').value = defaults.model
      $('prompt').value = defaults.prompt
      $('run').addEventListener('click', run)
    })
  </script>
</head>
<body>
  <div class="card">
    <h1>Gateway Ping (/api)</h1>
    <div class="small">
      Проверяет доступность serverless‑эндпоинтов <code>/api/openrouter</code> и <code>/api/groq</code> с текущего домена.
      Нужны серверные переменные OPENROUTER_API_KEY / GROQ_API_KEY. На локалке без ключей — вернётся 400/401.
    </div>

    <label>
      Model:
      <input id="model" type="text" placeholder="model" />
    </label>
    <label>
      Prompt:
      <input id="prompt" type="text" placeholder="prompt" />
    </label>

    <button id="run">Ping /api</button>

    <div class="row">
      <div>
        <div class="small">/api/openrouter</div>
        <pre id="out-or"></pre>
      </div>
      <div>
        <div class="small">/api/groq</div>
        <pre id="out-groq"></pre>
      </div>
    </div>
  </div>
</body>
</html>
